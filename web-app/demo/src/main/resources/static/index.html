<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Crypto App</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        text-align: center;
        padding: 50px;
    }

    .container {
        background: white;
        color: black;
        padding: 30px;
        border-radius: 15px;
        width: 400px;
        margin: auto;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
        margin-bottom: 20px;
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    button {
        padding: 10px 15px;
        margin: 5px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        color: white;
        font-weight: bold;
    }

    .encrypt { background: #28a745; }
    .decrypt { background: #007bff; }
    .hash { background: #ff9800; }

    button:hover {
        opacity: 0.8;
    }

    #result {
        margin-top: 20px;
        padding: 10px;
        background: #f1f1f1;
        border-radius: 8px;
        word-break: break-all;
    }
</style>
</head>

<body>

<div class="container">
    <h2>🔐 Crypto Application</h2>

    <input type="text" id="text" placeholder="Entrer un texte">

    <br>

    <button class="encrypt" onclick="encrypt()">Chiffrer</button>
    <button class="decrypt" onclick="decrypt()">Déchiffrer</button>
    <button class="hash" onclick="hash()">Hash SHA-256</button>

    <div id="result">Résultat ici...</div>
</div>

<script>

function encrypt() {
    let text = document.getElementById("text").value;

    fetch("/crypt", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({text: text})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText = data.encrypted;
    });
}

function decrypt() {
    let text = document.getElementById("text").value;

    fetch("/decrypt?data=" + encodeURIComponent(text))
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText = data.decrypted;
    });
}

function hash() {
    let text = document.getElementById("text").value;

    fetch("/hash", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({text: text})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText = data.hash;
    });
}

</script>

</body>
</html>
